name: Supabase migration drift check

on:
  pull_request:
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/supabase-migration-drift.yml"

jobs:
  check-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: Detect unapplied migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          output=$(supabase migration list --linked)
          echo "$output"
          # A pending migration shows up with a local version but blank remote column.
          # Parse the table and fail if any row has a local version with no remote match.
          drift=$(echo "$output" | awk -F'|' 'NR>2 && $1 ~ /[0-9]+/ && $2 !~ /[0-9]+/ {print $1}' | tr -d ' ')
          if [ -n "$drift" ]; then
            echo "::error::Local migrations not applied to remote: $drift"
            echo "Run 'supabase db push' locally, or migration repair if already applied out-of-band."
            exit 1
          fi
          echo "Migrations in sync."
